name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '5 7 13 * *' #monthly, a lot of primes - for no reason

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'

jobs:
  test-and-lint:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}


    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Add Poetry to PATH (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        echo "C:\Users\runneradmin\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Check lock file
      run: poetry check

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root

    - name: Install project
      run: |
        poetry install --no-interaction
        poetry --version

    - name: Run Linting
      if: matrix.os == 'ubuntu-latest'
      run: poetry run pylint --output-format github ./src ./tests
      continue-on-error: true

    - name: Run Tests
      run: poetry run pytest

    - name: Build Binary
      run: poetry run pyinstaller --onefile src/main.py --name nea-geofly-mapper

    - name: Attach Binary
      uses: actions/upload-artifact@v7
      with:
        name: nea-geofly-mapper-${{ matrix.os }}
        path: |
          dist/nea-geofly-mapper
          dist/nea-geofly-mapper.exe
        if-no-files-found: error
        retention-days: 7
